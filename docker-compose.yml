version: '3.8'

services:
  # 主应用服务
  shop-assistant-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop-assistant-chat
    ports:
      - "8800:8800"
    env_file:
      - .env.local
    environment:
      # Redis配置（使用外部Redis）
      - REDIS_URL=redis://:acctrue666888666@183.222.230.18:6379/0
    volumes:
      # 日志文件挂载
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
